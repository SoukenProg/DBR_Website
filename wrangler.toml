name = "dbr-website"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# 本番環境の vars（機密でないもの）
# 機密情報（APIキー等）は `wrangler secret put <KEY>` で登録すること
[vars]
# NODE_ENV = "production"  # 必要に応じてアンコメント

# Cloudflare Access で保護するサブドメインの設定
# portfolio.souken521.com への Access ポリシーは Cloudflare ダッシュボードで設定する
# カスタムドメインはダッシュボードの Workers > Custom Domains から追加:
#   - souken521.com
#   - portfolio.souken521.com
